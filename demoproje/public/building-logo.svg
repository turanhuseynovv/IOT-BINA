<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Building body -->
  <rect x="8" y="12" width="24" height="24" rx="2" fill="#4F8EF7" opacity="0.9"/>
  <!-- Windows row 1 -->
  <rect x="12" y="16" width="5" height="4" rx="1" fill="white" opacity="0.5"/>
  <rect x="23" y="16" width="5" height="4" rx="1" fill="white" opacity="0.5"/>
  <!-- Windows row 2 -->
  <rect x="12" y="24" width="5" height="4" rx="1" fill="white" opacity="0.5"/>
  <rect x="23" y="24" width="5" height="4" rx="1" fill="white" opacity="0.5"/>
  <!-- Door -->
  <rect x="17" y="30" width="6" height="6" rx="1" fill="white" opacity="0.7"/>
  <!-- IoT signal (antenna) -->
  <circle cx="20" cy="7" r="2.5" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.4"/>
  <circle cx="20" cy="7" r="5" fill="none" stroke="#10B981" stroke-width="1.2" opacity="0.25"/>
  <circle cx="20" cy="7" r="1" fill="#10B981"/>
